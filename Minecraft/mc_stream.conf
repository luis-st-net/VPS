# At the top of /etc/nginx/nginx.conf
# Add include /etc/nginx/mc_stream.conf;

stream {
    upstream minecraft {
        server 10.2.0.2:25565 max_fails=1 fail_timeout=2s;  # PC
        server 10.2.0.3:25565 max_fails=1 fail_timeout=2s;  # Laptop
    }

    server {
        listen 21212;
        proxy_pass minecraft;
        proxy_connect_timeout 5s;
        proxy_timeout 600s;  # 10 minutes for idle connections
    }
}

