services:
  bitwarden:
    image: ghcr.io/bitwarden/lite
    container_name: bitwarden
    environment:
      BW_DOMAIN: ${BW_DOMAIN}
      BW_DB_PROVIDER: "postgresql"
      BW_DB_SERVER: "host.docker.internal"
      BW_DB_DATABASE: "bitwarden"
      BW_DB_USERNAME: ${BW_DB_USERNAME}
      BW_DB_PASSWORD: ${BW_DB_PASSWORD}
      BW_INSTALLATION_ID: ${BW_INSTALLATION_ID}
      BW_INSTALLATION_KEY: ${BW_INSTALLATION_KEY}
      globalSettings__mail__replyToEmail: ${BW_MAIL_EMAIL}
      globalSettings__mail__smtp__host: ${BW_MAIL_HOST}
      globalSettings__mail__smtp__port: 465
      globalSettings__mail__smtp__ssl: true
      globalSettings__mail__smtp__username: ${BW_MAIL_USERNAME}
      globalSettings__mail__smtp__password: ${BW_MAIL_PASSWORD}
      globalSettings__disableUserRegistration: true
      adminSettings__admins: ${BW_ADMINS}
    volumes:
      - bitwarden-data:/etc/bitwarden
    ports:
      - "3005:8080"
    restart: unless-stopped
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  bitwarden-data:

